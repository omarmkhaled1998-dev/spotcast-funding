<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <rect width="800" height="450" fill="#0e2334"/>
  <!-- Grid -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#839ba3" stroke-width="0.3" opacity="0.2"/>
    </pattern>
  </defs>
  <rect width="800" height="400" fill="url(#grid)"/>
  <!-- Title -->
  <text x="400" y="28" font-family="monospace" font-size="11" fill="#dd7c99" text-anchor="middle">GROUND FLOOR — GF · COMMUNITY &amp; SERVICES</text>
  <!-- Floor plan outline -->
  <rect x="80" y="50" width="460" height="310" fill="#122033" stroke="#839ba3" stroke-width="1.5" rx="2"/>
  <!-- Structural grid lines -->
  <line x1="80" y1="155" x2="540" y2="155" stroke="#839ba3" stroke-width="0.5" stroke-dasharray="4,4" opacity="0.4"/>
  <line x1="80" y1="260" x2="540" y2="260" stroke="#839ba3" stroke-width="0.5" stroke-dasharray="4,4" opacity="0.4"/>
  <line x1="195" y1="50" x2="195" y2="360" stroke="#839ba3" stroke-width="0.5" stroke-dasharray="4,4" opacity="0.4"/>
  <line x1="310" y1="50" x2="310" y2="360" stroke="#839ba3" stroke-width="0.5" stroke-dasharray="4,4" opacity="0.4"/>
  <line x1="425" y1="50" x2="425" y2="360" stroke="#839ba3" stroke-width="0.5" stroke-dasharray="4,4" opacity="0.4"/>
  <!-- Café area -->
  <rect x="88" y="58" width="100" height="90" fill="#1a3020" opacity="0.5" rx="1"/>
  <text x="138" y="98" font-family="monospace" font-size="8" fill="#dd7c99" text-anchor="middle">CAFÉ</text>
  <text x="138" y="110" font-family="monospace" font-size="7" fill="#839ba3" text-anchor="middle">~80 m²</text>
  <!-- Tables in café -->
  <circle cx="110" cy="80" r="6" fill="none" stroke="#839ba3" stroke-width="1"/>
  <circle cx="130" cy="80" r="6" fill="none" stroke="#839ba3" stroke-width="1"/>
  <circle cx="150" cy="80" r="6" fill="none" stroke="#839ba3" stroke-width="1"/>
  <circle cx="170" cy="80" r="6" fill="none" stroke="#839ba3" stroke-width="1"/>
  <!-- Reception -->
  <rect x="88" y="155" width="100" height="65" fill="#1e2a4a" opacity="0.6" rx="1"/>
  <text x="138" y="185" font-family="monospace" font-size="8" fill="#dd7c99" text-anchor="middle">RECEPTION</text>
  <text x="138" y="197" font-family="monospace" font-size="7" fill="#839ba3" text-anchor="middle">~50 m²</text>
  <!-- Reception desk -->
  <rect x="100" y="162" width="70" height="15" fill="#2a3a5a" stroke="#839ba3" stroke-width="0.8"/>
  <!-- Event Hall -->
  <rect x="195" y="58" width="230" height="197" fill="#1a2a5a" opacity="0.4" rx="1"/>
  <text x="310" y="155" font-family="monospace" font-size="10" fill="#dd7c99" text-anchor="middle">EVENT HALL</text>
  <text x="310" y="169" font-family="monospace" font-size="8" fill="#839ba3" text-anchor="middle">200 seats · ~250 m²</text>
  <!-- Stage -->
  <rect x="215" y="68" width="190" height="40" fill="#2a3a6a" opacity="0.6" rx="1"/>
  <text x="310" y="92" font-family="monospace" font-size="8" fill="#839ba3" text-anchor="middle">STAGE</text>
  <!-- Seating rows -->
  <line x1="215" y1="125" x2="385" y2="125" stroke="#839ba3" stroke-width="0.5" opacity="0.4"/>
  <line x1="215" y1="140" x2="385" y2="140" stroke="#839ba3" stroke-width="0.5" opacity="0.4"/>
  <line x1="215" y1="155" x2="385" y2="155" stroke="#839ba3" stroke-width="0.5" opacity="0.4"/>
  <line x1="215" y1="170" x2="385" y2="170" stroke="#839ba3" stroke-width="0.5" opacity="0.4"/>
  <line x1="215" y1="185" x2="385" y2="185" stroke="#839ba3" stroke-width="0.5" opacity="0.4"/>
  <line x1="215" y1="200" x2="385" y2="200" stroke="#839ba3" stroke-width="0.5" opacity="0.4"/>
  <line x1="215" y1="215" x2="385" y2="215" stroke="#839ba3" stroke-width="0.5" opacity="0.4"/>
  <!-- Storage + bathrooms -->
  <rect x="88" y="227" width="50" height="40" fill="#1a2035" opacity="0.7" rx="1"/>
  <text x="113" y="250" font-family="monospace" font-size="6" fill="#839ba3" text-anchor="middle">WC</text>
  <rect x="143" y="227" width="45" height="40" fill="#1a2035" opacity="0.7" rx="1"/>
  <text x="165" y="250" font-family="monospace" font-size="6" fill="#839ba3" text-anchor="middle">STORE</text>
  <!-- Garden access -->
  <rect x="88" y="275" width="107" height="80" fill="#1a3020" opacity="0.4" rx="1"/>
  <text x="141" y="315" font-family="monospace" font-size="8" fill="#6a9060" text-anchor="middle">GARDEN</text>
  <text x="141" y="327" font-family="monospace" font-size="7" fill="#839ba3" text-anchor="middle">ACCESS</text>
  <!-- Circulation / stairs -->
  <rect x="425" y="58" width="107" height="60" fill="#1a2a3a" opacity="0.6" rx="1"/>
  <text x="478" y="85" font-family="monospace" font-size="7" fill="#839ba3" text-anchor="middle">STAIRS / LIFT</text>
  <text x="478" y="97" font-family="monospace" font-size="7" fill="#839ba3" text-anchor="middle">CORE</text>
  <!-- Main entrance -->
  <rect x="250" y="340" width="100" height="22" fill="#dd7c99" opacity="0.3" rx="1"/>
  <text x="300" y="355" font-family="monospace" font-size="8" fill="#dd7c99" text-anchor="middle">MAIN ENTRANCE</text>
  <!-- Entrance arrow -->
  <polygon points="300,375 295,365 305,365" fill="#dd7c99" opacity="0.6"/>
  <!-- 3D sketch right side -->
  <rect x="560" y="50" width="215" height="310" fill="#0a1825" rx="4" stroke="#dd7c99" stroke-width="0.5" opacity="0.5"/>
  <text x="667" y="70" font-family="monospace" font-size="9" fill="#dd7c99" text-anchor="middle">3D VIEW</text>
  <!-- Isometric café + hall sketch -->
  <polygon points="580,200 660,160 740,200 740,280 660,320 580,280" fill="#122033" stroke="#6a90b0" stroke-width="1" opacity="0.7"/>
  <polygon points="580,200 660,160 660,240 580,280" fill="#1e2a3a" stroke="#6a90b0" stroke-width="0.8" opacity="0.6"/>
  <polygon points="660,160 740,200 740,280 660,240" fill="#2a3347" stroke="#6a90b0" stroke-width="0.8" opacity="0.6"/>
  <text x="667" y="300" font-family="monospace" font-size="7" fill="#839ba3" text-anchor="middle">Ground Floor — Community Level</text>
  <!-- Label -->
  <rect x="0" y="400" width="800" height="50" fill="rgba(14,35,52,0.9)"/>
  <text x="30" y="422" font-family="monospace" font-size="10" fill="#dd7c99">03 / 06</text>
  <text x="30" y="438" font-family="monospace" font-size="11" fill="white">Ground Floor — Community · Café · Event Hall · Garden</text>
</svg>
