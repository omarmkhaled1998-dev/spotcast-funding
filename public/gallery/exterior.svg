<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <rect width="800" height="450" fill="#0e2334"/>
  <!-- Sky gradient -->
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1825"/>
      <stop offset="100%" stop-color="#1a3a55"/>
    </linearGradient>
    <linearGradient id="facade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a3347"/>
      <stop offset="100%" stop-color="#1e2a3a"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#sky)"/>
  <!-- Ground -->
  <rect x="0" y="370" width="800" height="80" fill="#0a1520"/>
  <!-- Perimeter wall -->
  <rect x="60" y="340" width="680" height="30" fill="#1a2a3a" rx="2"/>
  <!-- Building body -->
  <rect x="120" y="120" width="560" height="250" fill="url(#facade)" rx="3"/>
  <!-- Window bands - 3 floors -->
  <rect x="130" y="135" width="540" height="55" fill="#6a90b0" opacity="0.35" rx="1"/>
  <rect x="130" y="205" width="540" height="55" fill="#6a90b0" opacity="0.35" rx="1"/>
  <rect x="130" y="275" width="540" height="55" fill="#6a90b0" opacity="0.35" rx="1"/>
  <!-- Window mullions -->
  <line x1="210" y1="135" x2="210" y2="190" stroke="#0e2334" stroke-width="2" opacity="0.5"/>
  <line x1="300" y1="135" x2="300" y2="190" stroke="#0e2334" stroke-width="2" opacity="0.5"/>
  <line x1="390" y1="135" x2="390" y2="190" stroke="#0e2334" stroke-width="2" opacity="0.5"/>
  <line x1="480" y1="135" x2="480" y2="190" stroke="#0e2334" stroke-width="2" opacity="0.5"/>
  <line x1="570" y1="135" x2="570" y2="190" stroke="#0e2334" stroke-width="2" opacity="0.5"/>
  <line x1="210" y1="205" x2="210" y2="260" stroke="#0e2334" stroke-width="2" opacity="0.5"/>
  <line x1="300" y1="205" x2="300" y2="260" stroke="#0e2334" stroke-width="2" opacity="0.5"/>
  <line x1="390" y1="205" x2="390" y2="260" stroke="#0e2334" stroke-width="2" opacity="0.5"/>
  <line x1="480" y1="205" x2="480" y2="260" stroke="#0e2334" stroke-width="2" opacity="0.5"/>
  <line x1="570" y1="205" x2="570" y2="260" stroke="#0e2334" stroke-width="2" opacity="0.5"/>
  <!-- Roof -->
  <rect x="110" y="100" width="580" height="25" fill="#1e2a3a" rx="2"/>
  <!-- Solar panels on roof -->
  <rect x="160" y="68" width="480" height="35" fill="#1a3040" rx="2"/>
  <line x1="220" y1="68" x2="220" y2="103" stroke="#dd7c99" stroke-width="1" opacity="0.4"/>
  <line x1="280" y1="68" x2="280" y2="103" stroke="#dd7c99" stroke-width="1" opacity="0.4"/>
  <line x1="340" y1="68" x2="340" y2="103" stroke="#dd7c99" stroke-width="1" opacity="0.4"/>
  <line x1="400" y1="68" x2="400" y2="103" stroke="#dd7c99" stroke-width="1" opacity="0.4"/>
  <line x1="460" y1="68" x2="460" y2="103" stroke="#dd7c99" stroke-width="1" opacity="0.4"/>
  <line x1="520" y1="68" x2="520" y2="103" stroke="#dd7c99" stroke-width="1" opacity="0.4"/>
  <!-- Entrance -->
  <rect x="340" y="285" width="120" height="85" fill="#1a2a3a" rx="2"/>
  <rect x="348" y="293" width="50" height="77" fill="#4a7090" opacity="0.5" rx="1"/>
  <rect x="402" y="293" width="50" height="77" fill="#4a7090" opacity="0.5" rx="1"/>
  <!-- Olive tree left -->
  <circle cx="95" cy="295" r="35" fill="#1a3020" opacity="0.8"/>
  <circle cx="88" cy="280" r="22" fill="#1e3825" opacity="0.7"/>
  <rect x="92" y="325" width="6" height="20" fill="#2a1a08"/>
  <!-- Olive tree right -->
  <circle cx="705" cy="295" r="35" fill="#1a3020" opacity="0.8"/>
  <circle cx="712" cy="280" r="22" fill="#1e3825" opacity="0.7"/>
  <rect x="702" y="325" width="6" height="20" fill="#2a1a08"/>
  <!-- SpotCast signage -->
  <text x="400" y="115" font-family="monospace" font-size="11" fill="#dd7c99" text-anchor="middle" opacity="0.9">SPOTCAST COMMUNITY &amp; MEDIA HUB</text>
  <!-- Label -->
  <rect x="0" y="400" width="800" height="50" fill="rgba(14,35,52,0.9)"/>
  <text x="30" y="422" font-family="monospace" font-size="10" fill="#dd7c99">01 / 06</text>
  <text x="30" y="438" font-family="monospace" font-size="11" fill="white">Exterior Rendering — Berqayel, Akkar</text>
</svg>
