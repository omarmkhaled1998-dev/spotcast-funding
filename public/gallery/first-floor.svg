  <rect x="160" y="68" width="25" height="15" fill="#2a3a6a" opacity="0.7" rx="1"/>
  <rect x="190" y="68" width="25" height="15" fill="#2a3a6a" opacity="0.7" rx="1"/>
  <rect x="220" y="68" width="25" height="15" fill="#2a3a6a" opacity="0.7" rx="1"/>
  <rect x="100" y="90" width="25" height="15" fill="#2a3a6a" opacity="0.7" rx="1"/>
  <rect x="130" y="90" width="25" height="15" fill="#2a3a6a" opacity="0.7" rx="1"/>
  <rect x="160" y="90" width="25" height="15" fill="#2a3a6a" opacity="0.7" rx="1"/>
  <rect x="190" y="90" width="25" height="15" fill="#2a3a6a" opacity="0.7" rx="1"/>
  <rect x="220" y="90" width="25" height="15" fill="#2a3a6a" opacity="0.7" rx="1"/>
  <rect x="100" y="112" width="25" height="15" fill="#2a3a6a" opacity="0.7" rx="1"/>
  <rect x="130" y="112" width="25" height="15" fill="#2a3a6a" opacity="0.7" rx="1"/>
  <rect x="160" y="112" width="25" height="15" fill="#2a3a6a" opacity="0.7" rx="1"/>
  <rect x="190" y="112" width="25" height="15" fill="#2a3a6a" opacity="0.7" rx="1"/>
  <rect x="220" y="112" width="25" height="15" fill="#2a3a6a" opacity="0.7" rx="1"/>
  <!-- Meeting room -->
