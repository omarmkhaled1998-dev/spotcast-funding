  <rect x="320" y="258" width="55" height="45" fill="#1e2a3a" opacity="0.7" rx="1" stroke="#839ba3" stroke-width="0.5"/>
  <text x="347" y="284" font-family="monospace" font-size="6" fill="#839ba3" text-anchor="middle">OFFICE 3</text>
  <rect x="200" y="310" width="55" height="45" fill="#1e2a3a" opacity="0.7" rx="1" stroke="#839ba3" stroke-width="0.5"/>
  <text x="227" y="336" font-family="monospace" font-size="6" fill="#839ba3" text-anchor="middle">OFFICE 4</text>
  <rect x="260" y="310" width="55" height="45" fill="#1e2a3a" opacity="0.7" rx="1" stroke="#839ba3" stroke-width="0.5"/>
  <text x="287" y="336" font-family="monospace" font-size="6" fill="#839ba3" text-anchor="middle">OFFICE 5</text>
  <rect x="320" y="310" width="55" height="45" fill="#1e2a3a" opacity="0.7" rx="1" stroke="#839ba3" stroke-width="0.5"/>
  <text x="347" y="336" font-family="monospace" font-size="6" fill="#839ba3" text-anchor="middle">OFFICE 6</text>
  <!-- Offices right column -->
  <rect x="316" y="58" width="100" height="55" fill="#1e2a3a" opacity="0.7" rx="1" stroke="#839ba3" stroke-width="0.5"/>
  <text x="366" y="89" font-family="monospace" font-size="7" fill="#839ba3" text-anchor="middle">OFFICES 7–10</text>
