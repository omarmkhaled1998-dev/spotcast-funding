  <rect x="316" y="120" width="100" height="40" fill="#1a2535" opacity="0.6" rx="1"/>
  <text x="366" y="143" font-family="monospace" font-size="7" fill="#839ba3" text-anchor="middle">PANTRY / WC</text>
  <!-- 3D sketch right -->
  <rect x="560" y="50" width="215" height="310" fill="#0a1825" rx="4" stroke="#dd7c99" stroke-width="0.5" opacity="0.5"/>
  <text x="667" y="70" font-family="monospace" font-size="9" fill="#dd7c99" text-anchor="middle">3D VIEW</text>
  <polygon points="580,200 660,160 740,200 740,280 660,320 580,280" fill="#122033" stroke="#6a90b0" stroke-width="1" opacity="0.7"/>
  <polygon points="580,200 660,160 660,240 580,280" fill="#1a2a4a" stroke="#6a90b0" stroke-width="0.8" opacity="0.6"/>
  <polygon points="660,160 740,200 740,280 660,240" fill="#2a3a5a" stroke="#6a90b0" stroke-width="0.8" opacity="0.6"/>
  <text x="667" y="300" font-family="monospace" font-size="7" fill="#839ba3" text-anchor="middle">1st Floor — Co-working Level</text>
  <!-- Label -->
  <rect x="0" y="400" width="800" height="50" fill="rgba(14,35,52,0.9)"/>
  <text x="30" y="422" font-family="monospace" font-size="10" fill="#dd7c99">04 / 06</text>
  <text x="30" y="438" font-family="monospace" font-size="11" fill="white">1st Floor — Co-working · Meeting Room · 10 Private Offices</text>
