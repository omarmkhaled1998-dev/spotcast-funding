<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <rect width="800" height="450" fill="#0e2334"/>
  <defs>
    <pattern id="grid3" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#839ba3" stroke-width="0.3" opacity="0.2"/>
    </pattern>
  </defs>
  <rect width="800" height="400" fill="url(#grid3)"/>
  <text x="400" y="28" font-family="monospace" font-size="11" fill="#dd7c99" text-anchor="middle">FIRST FLOOR — 1F · CO-WORKING &amp; OFFICES</text>
  <!-- Floor plan outline -->
  <rect x="80" y="50" width="460" height="310" fill="#122033" stroke="#839ba3" stroke-width="1.5" rx="2"/>
  <!-- Grid lines -->
  <line x1="80" y1="155" x2="540" y2="155" stroke="#839ba3" stroke-width="0.5" stroke-dasharray="4,4" opacity="0.4"/>
  <line x1="80" y1="260" x2="540" y2="260" stroke="#839ba3" stroke-width="0.5" stroke-dasharray="4,4" opacity="0.4"/>
  <line x1="195" y1="50" x2="195" y2="360" stroke="#839ba3" stroke-width="0.5" stroke-dasharray="4,4" opacity="0.4"/>
  <line x1="310" y1="50" x2="310" y2="360" stroke="#839ba3" stroke-width="0.5" stroke-dasharray="4,4" opacity="0.4"/>
  <line x1="425" y1="50" x2="425" y2="360" stroke="#839ba3" stroke-width="0.5" stroke-dasharray="4,4" opacity="0.4"/>
  <!-- Co-working open area -->
