<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1825"/>
      <stop offset="100%" stop-color="#0e2334"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg2)"/>
  <!-- Grid lines -->
  <line x1="0" y1="150" x2="800" y2="150" stroke="#839ba3" stroke-width="0.5" opacity="0.15"/>
  <line x1="0" y1="300" x2="800" y2="300" stroke="#839ba3" stroke-width="0.5" opacity="0.15"/>
  <line x1="200" y1="0" x2="200" y2="450" stroke="#839ba3" stroke-width="0.5" opacity="0.15"/>
  <line x1="400" y1="0" x2="400" y2="450" stroke="#839ba3" stroke-width="0.5" opacity="0.15"/>
  <line x1="600" y1="0" x2="600" y2="450" stroke="#839ba3" stroke-width="0.5" opacity="0.15"/>
  <!-- Site map - top left -->
  <rect x="30" y="30" width="180" height="120" fill="#122033" rx="4" stroke="#dd7c99" stroke-width="1" opacity="0.6"/>
  <text x="120" y="50" font-family="monospace" font-size="9" fill="#dd7c99" text-anchor="middle">SITE MAP · BERQAYEL</text>
  <!-- Site boundary -->
  <rect x="55" y="60" width="130" height="75" fill="none" stroke="#839ba3" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- Building footprint on site -->
  <rect x="75" y="75" width="90" height="50" fill="#dd7c99" opacity="0.25" rx="1"/>
  <!-- Road -->
  <line x1="30" y1="135" x2="55" y2="135" stroke="#839ba3" stroke-width="3" opacity="0.4"/>
  <line x1="185" y1="135" x2="210" y2="135" stroke="#839ba3" stroke-width="3" opacity="0.4"/>
  <!-- Massing study - top center -->
  <rect x="240" y="30" width="160" height="120" fill="#122033" rx="4" stroke="#dd7c99" stroke-width="1" opacity="0.6"/>
  <text x="320" y="50" font-family="monospace" font-size="9" fill="#dd7c99" text-anchor="middle">3D MASSING STUDY</text>
  <!-- Simple 3D box massing -->
  <rect x="270" y="75" width="60" height="60" fill="#2a3347" stroke="#6a90b0" stroke-width="1"/>
  <polygon points="270,75 310,55 370,55 330,75" fill="#1e2a3a" stroke="#6a90b0" stroke-width="1"/>
  <rect x="330" y="55" width="40" height="60" fill="#1e2a3a" stroke="#6a90b0" stroke-width="1"/>
  <!-- Materials palette - top right -->
  <rect x="430" y="30" width="160" height="120" fill="#122033" rx="4" stroke="#dd7c99" stroke-width="1" opacity="0.6"/>
  <text x="510" y="50" font-family="monospace" font-size="9" fill="#dd7c99" text-anchor="middle">MATERIAL PALETTE</text>
  <rect x="450" y="60" width="30" height="30" fill="#2a3347" rx="2"/>
  <text x="485" y="78" font-family="monospace" font-size="8" fill="#839ba3">Concrete</text>
  <rect x="450" y="98" width="30" height="20" fill="#6a90b0" opacity="0.6" rx="2"/>
  <text x="485" y="112" font-family="monospace" font-size="8" fill="#839ba3">Low-E Glass</text>
  <rect x="530" y="60" width="30" height="30" fill="#1a3020" rx="2"/>
  <text x="565" y="78" font-family="monospace" font-size="8" fill="#839ba3">Olive Tree</text>
  <rect x="530" y="98" width="30" height="20" fill="#dd7c99" opacity="0.4" rx="2"/>
  <text x="565" y="112" font-family="monospace" font-size="8" fill="#839ba3">Signage</text>
  <!-- Section cut - bottom left -->
  <rect x="30" y="170" width="230" height="180" fill="#122033" rx="4" stroke="#dd7c99" stroke-width="1" opacity="0.6"/>
  <text x="145" y="188" font-family="monospace" font-size="9" fill="#dd7c99" text-anchor="middle">SECTION A-A'</text>
  <!-- Section floors -->
  <line x1="50" y1="330" x2="240" y2="330" stroke="#839ba3" stroke-width="1.5"/>
  <line x1="50" y1="305" x2="240" y2="305" stroke="#839ba3" stroke-width="1"/>
  <line x1="50" y1="280" x2="240" y2="280" stroke="#839ba3" stroke-width="1"/>
  <line x1="50" y1="255" x2="240" y2="255" stroke="#839ba3" stroke-width="1"/>
  <line x1="50" y1="230" x2="240" y2="230" stroke="#839ba3" stroke-width="1"/>
  <line x1="50" y1="205" x2="240" y2="205" stroke="#839ba3" stroke-width="1"/>
  <!-- Section walls -->
  <line x1="50" y1="205" x2="50" y2="330" stroke="#839ba3" stroke-width="2"/>
  <line x1="240" y1="205" x2="240" y2="330" stroke="#839ba3" stroke-width="2"/>
  <!-- Floor labels -->
  <text x="245" y="210" font-family="monospace" font-size="7" fill="#839ba3">Roof</text>
  <text x="245" y="234" font-family="monospace" font-size="7" fill="#839ba3">2F</text>
  <text x="245" y="258" font-family="monospace" font-size="7" fill="#839ba3">1F</text>
  <text x="245" y="282" font-family="monospace" font-size="7" fill="#839ba3">GF</text>
  <text x="245" y="308" font-family="monospace" font-size="7" fill="#839ba3">B1</text>
  <text x="245" y="333" font-family="monospace" font-size="7" fill="#839ba3">B2</text>
  <!-- Analysis notes - bottom center/right -->
  <rect x="280" y="170" width="490" height="180" fill="#122033" rx="4" stroke="#dd7c99" stroke-width="1" opacity="0.6"/>
  <text x="525" y="188" font-family="monospace" font-size="9" fill="#dd7c99" text-anchor="middle">SITE ANALYSIS &amp; DESIGN BRIEF</text>
  <text x="300" y="210" font-family="monospace" font-size="9" fill="#839ba3">Site Area      1,000 m²</text>
  <text x="300" y="228" font-family="monospace" font-size="9" fill="#839ba3">Frontage       20 m (main road)</text>
  <text x="300" y="246" font-family="monospace" font-size="9" fill="#839ba3">GFA            ~3,000 m² (6 levels)</text>
  <text x="300" y="264" font-family="monospace" font-size="9" fill="#839ba3">Climate        Mediterranean / Hot-dry</text>
  <text x="300" y="282" font-family="monospace" font-size="9" fill="#839ba3">Strategy       Passive cooling + solar</text>
  <text x="300" y="300" font-family="monospace" font-size="9" fill="#839ba3">Target         Net-zero operational</text>
  <text x="490" y="210" font-family="monospace" font-size="9" fill="#839ba3">Orientation    North-south axis</text>
  <text x="490" y="228" font-family="monospace" font-size="9" fill="#839ba3">Shading        Recessed 600mm</text>
  <text x="490" y="246" font-family="monospace" font-size="9" fill="#839ba3">Structure      Reinforced concrete</text>
  <text x="490" y="264" font-family="monospace" font-size="9" fill="#dd7c99">Donor std.     UN / INGO compliant</text>
  <text x="490" y="282" font-family="monospace" font-size="9" fill="#dd7c99">Security       ACTS Codes</text>
  <text x="490" y="300" font-family="monospace" font-size="9" fill="#dd7c99">Location       Berqayel, Akkar</text>
  <!-- Label bar -->
  <rect x="0" y="400" width="800" height="50" fill="rgba(14,35,52,0.9)"/>
  <text x="30" y="422" font-family="monospace" font-size="10" fill="#dd7c99">02 / 06</text>
  <text x="30" y="438" font-family="monospace" font-size="11" fill="white">Design Process &amp; Site Analysis</text>
</svg>
