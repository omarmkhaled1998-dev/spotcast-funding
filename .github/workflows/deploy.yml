name: Deploy to Vercel

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trigger Vercel deployment via API
        run: |
          curl -X POST "https://api.vercel.com/v13/deployments" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"name\": \"spotcast-funding\",
              \"project\": \"prj_hWrQNVfeqHT8Pj8V8QK88LkOrjFC\",
              \"target\": \"production\",
              \"gitSource\": {
                \"type\": \"github\",
                \"repoId\": \"${{ github.repository_id }}\",
                \"ref\": \"main\",
                \"sha\": \"${{ github.sha }}\"
              }
            }" | tee /tmp/vercel_response.json
          cat /tmp/vercel_response.json | python3 -c "
          import sys, json
          r = json.load(sys.stdin)
          url = r.get('url') or r.get('inspectorUrl') or r.get('error', {}).get('message', 'check Vercel dashboard')
          print('Deployment URL:', url)
          "
